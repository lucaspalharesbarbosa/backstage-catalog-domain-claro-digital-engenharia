# Zeebe gRPC — orquestração BPMN
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: camunda-zeebe-grpc
  title: Camunda Zeebe — gRPC
  description: >-
    gRPC Zeebe — arranque de processos, jobs e workers (integração com
    camunda-zeebe-grpc / clientes corporativos).
spec:
  type: grpc
  lifecycle: production
  owner: group:default/squad-gerador-scaffolding
  system: system:default/camunda-zeebe-8
  definition: |
    syntax = "proto3";

    package io.camunda.zeebe.gateway.protocol;

    // Superfície simplificada para catálogo — ver gateway.proto oficial Camunda 8.
    service Gateway {
      rpc CreateProcessInstance (CreateProcessInstanceRequest) returns (CreateProcessInstanceResponse);
      rpc ActivateJobs (ActivateJobsRequest) returns (stream ActivateJobsResponse);
      rpc CompleteJob (CompleteJobRequest) returns (CompleteJobResponse);
    }

    message CreateProcessInstanceRequest {
      string bpmnProcessId = 1;
      int32 version = 2;
      string variables = 3;
    }

    message CreateProcessInstanceResponse {
      int64 processInstanceKey = 1;
    }

    message ActivateJobsRequest {
      string type = 1;
      string worker = 2;
      int32 timeout = 3;
      int32 maxJobsToActivate = 5;
    }

    message ActivateJobsResponse {
      int64 key = 1;
      string variables = 2;
    }

    message CompleteJobRequest {
      int64 jobKey = 1;
      string variables = 2;
    }

    message CompleteJobResponse {}
